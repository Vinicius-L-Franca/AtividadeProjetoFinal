services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: instaclone_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - instaclone

  nginx:
    image: nginx:alpine
    container_name: instaclone_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - instaclone

  mysql:
    image: mysql:8.0
    container_name: instaclone_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: instaclone
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: instaclone
      MYSQL_USER: instaclone
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - instaclone

networks:
  instaclone:

volumes:
  mysql_data: